# aiREST endpoint template — see SCHEMA.md for all fields.
# Generated by: airest new __NAME__
name: __NAME__
__CATEGORY_LINE__version: 1.0.0
description: Describe what this aiREST endpoint does.

method: POST
path: __PATH__

auth:
  required: true
  # type: apiKey              # apiKey | jwt | oauth2Introspect | trustGateway | none
  # jwt:
  #   issuer: https://auth.example.com
  #   audience: airest-api
  #   jwksUrl: https://auth.example.com/.well-known/jwks.json

inputSchema:
  type: object
  additionalProperties: false
  required:
    - text
  properties:
    text:
      type: string
      minLength: 1

systemPrompt: |
  You are an AI assistant.
  Return only valid JSON matching the output schema.

userPromptTemplate: |
  Text:
  {{text}}

outputSchema:
  type: object
  additionalProperties: false
  required:
    - result
  properties:
    result:
      type: string

model:
  provider: openai
  model: gpt-4.1-mini
  temperature: 0.2
  maxTokens: 1000

# Production baseline guardrails — extend with pii-redact, topic allowlists, etc.
guardrails:
  - module: max-request-size
    hook: preInput
    config:
      maxBytes: 65536
  - module: regex-block
    hook: preLlm
    config:
      target: prompt
      patterns:
        - "(?i)ignore (all )?(previous|above) instructions"
  - module: output-secret-scan
    hook: postLlm
    config: {}

# Optional Deno hooks — permissions: [] by default; network:host if host.fetch() is used
# hooks:
#   postInput:
#     runtime: deno
#     timeoutMs: 1000
#     permissions: []
#     script: |
#       function transform(input, host) {
#         return Object.assign({}, input, { enriched: true });
#       }

# Optional agentic tools — MCP (stdio/http/sse) and/or local Deno tools; tools.allow required
# tools:
#   local:
#     - name: my_tool
#       description: Short description for the LLM
#       toolPrompt: When to call this tool.
#       inputSchema:
#         type: object
#         required: [query]
#         properties:
#           query: { type: string }
#       runtime: deno
#       path: ./tools/my-tool.ts
#       permissions: []
#   mcpServers:
#     - name: my-mcp
#       transport: stdio
#       command: node
#       args: ["./mcp-server.mjs"]
#   allow:
#     - local/my_tool
#     - my-mcp/tool_name
#   toolTimeoutMs: 5000

policies:
  validateInput: true
  validateOutput: true
  retryOnInvalidJson: true
  retryOnInvalidSchema: true
  maxRetries: 2
  maxToolRounds: 5
  toolTimeoutMs: 10000
  stripMarkdownCodeFences: true
  logRequests: true
  logResponses: false
  redactInputs: false
  redactOutputs: false

cache:
  enabled: false
  # mode: semantic
  # similarityThreshold: 0.92
  # bypassOnGuardrailBlock: true

telemetry:
  enabled: true
  # Set enabled: false for PHI/PCI endpoints that must not export traces

health:
  message: __NAME__ is loaded and ready.

errors:
  inputValidation:
    message: Request body does not match the expected input schema for this endpoint.
  authentication:
    message: Missing or invalid API key for this endpoint.
  modelOutputValidation:
    message: The model response did not match the required output schema for this endpoint.
  modelProvider:
    message: The AI service is temporarily unavailable. Please retry shortly.
  guardrail:
    message: Request blocked by policy.
  hookExecution:
    message: Hook script failed.
  cache:
    message: Cache operation failed.

examples:
  request:
    text: Example input text
  response:
    result: Example structured output
