name: quick-sentiment
category: analytics
version: 1.0.0
description: Lightweight GET endpoint for quick sentiment checks via query parameters.

method: GET
path: /v1/quick-sentiment

auth:
  required: true

inputSchema:
  type: object
  additionalProperties: false
  required:
    - text
  properties:
    text:
      type: string
      minLength: 1

systemPrompt: |
  You are an expert sentiment analyst.
  Analyze the sentiment of the provided text.
  Return only valid JSON matching the output schema.

userPromptTemplate: |
  Text:
  {{text}}

outputSchema:
  type: object
  additionalProperties: false
  required:
    - sentiment
    - confidence
  properties:
    sentiment:
      type: string
      enum:
        - negative
        - neutral
        - positive
        - mixed
    confidence:
      type: number
      minimum: 0
      maximum: 1

model:
  provider: openai
  model: gpt-4.1-mini
  temperature: 0
  maxTokens: 400

guardrails:
  - module: max-request-size
    hook: preInput
    config:
      maxBytes: 4096

policies:
  validateInput: true
  validateOutput: true
  retryOnInvalidJson: true
  retryOnInvalidSchema: true
  maxRetries: 2
  stripMarkdownCodeFences: true
  logRequests: true
  logResponses: false

examples:
  request:
    text: I love this product!
  response:
    sentiment: positive
    confidence: 0.93
