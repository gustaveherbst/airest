name: kb-ticket-search-http
category: mcp
version: 1.0.0
description: KB search via remote MCP server (HTTP / streamableHttp transport).

method: POST
path: /v1/search-support-kb-http

auth:
  required: true

cache:
  enabled: false

guardrails:
  - module: max-request-size
    hook: preInput
    config:
      maxBytes: 65536
  - module: regex-block
    hook: preLlm
    config:
      target: prompt
      patterns:
        - "(?i)ignore (all )?(previous|above) instructions"
  - module: output-secret-scan
    hook: postLlm
    config: {}

tools:
  mcpServers:
    - name: support-kb
      transport: http
      url: http://127.0.0.1:3100/mcp
  allow:
    - support-kb/search_tickets
  toolTimeoutMs: 5000

inputSchema:
  type: object
  additionalProperties: false
  required:
    - query
  properties:
    query:
      type: string
      minLength: 1

systemPrompt: |
  You are a support knowledge assistant.
  Use the search_tickets MCP tool when you need KB context.
  Return only valid JSON matching the output schema.

userPromptTemplate: |
  Search the knowledge base for:
  {{query}}

outputSchema:
  type: object
  additionalProperties: false
  required:
    - summary
    - matches
  properties:
    summary:
      type: string
    matches:
      type: array
      items:
        type: object
        additionalProperties: false
        required:
          - id
          - subject
        properties:
          id:
            type: string
          subject:
            type: string

model:
  provider: openai
  model: gpt-4.1-mini
  temperature: 0
  maxTokens: 1200

policies:
  validateInput: true
  validateOutput: true
  maxToolRounds: 4
  toolTimeoutMs: 5000
  maxRetries: 1
  retryOnInvalidJson: true
  retryOnInvalidSchema: true
  stripMarkdownCodeFences: true
  logRequests: true
  logResponses: false
  redactInputs: true
  redactOutputs: true

examples:
  request:
    query: customer cannot reset password
  response:
    summary: Found similar password reset tickets.
    matches:
      - id: T-1001
        subject: Password reset loop
