name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.artifact_name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: airest-macos-arm64
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: airest-linux-x86_64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact_name: airest-linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-registry-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.artifact_name }}"
          cp "target/${{ matrix.target }}/release/airest" "dist/${{ matrix.artifact_name }}/airest"
          chmod 755 "dist/${{ matrix.artifact_name }}/airest"
          # Strip debug symbols only (safer for Mach-O + embedded V8 than full strip).
          if command -v strip >/dev/null 2>&1; then
            strip -S "dist/${{ matrix.artifact_name }}/airest" 2>/dev/null || true
          fi
          tar -czf "dist/${{ matrix.artifact_name }}.tar.gz" -C "dist/${{ matrix.artifact_name }}" airest
          archive="dist/${{ matrix.artifact_name }}.tar.gz"
          hash="$(openssl dgst -sha256 "$archive" | awk '{print $2}')"
          printf '%s  %s\n' "$hash" "$(basename "$archive")" > "${archive}.sha256"

      - name: Smoke test packaged binary
        shell: bash
        run: |
          set -euo pipefail
          "dist/${{ matrix.artifact_name }}/airest" --help >/dev/null

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}.tar.gz
            dist/${{ matrix.artifact_name }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all platform archives
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.tar.gz
            release/*.sha256
          generate_release_notes: true
